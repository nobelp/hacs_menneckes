config:
  title: Mennekes AMTRON Wallbox
  path: wallbox
  icon: mdi:ev-station
  views:
  - title: Übersicht
    path: wallbox-main
    icon: mdi:lightning-bolt
    cards:
    - type: entities
      title: Status
      icon: mdi:ev-station
      entities:
      - entity: sensor.wallbox_chargepoint_model
        name: Modell
      - entity: sensor.wallbox_software_version
        name: Software-Version
      - entity: sensor.wallbox_charging_status
        name: Ladestatus
      - entity: sensor.wallbox_vehicle_state_text
        name: Fahrzeugstatus
      - entity: sensor.wallbox_cp_availability_text
        name: Verfügbarkeit
      - entity: sensor.wallbox_plug_lock_status_text
        name: Steckerschloss
      - entity: sensor.wallbox_error_codes_text
        name: Fehlercodes
      - entity: sensor.protocol_version
        name: Protokoll-Version
    - type: entities
      title: Aktuelle Ladesession
      icon: mdi:battery-charging
      entities:
      - entity: sensor.wallbox_session_energy_kwh
        name: Energie Session
      - entity: sensor.wallbox_charge_duration_formatted
        name: Ladedauer
      - entity: sensor.signaled_current
        name: Signalisierter Strom
      - entity: sensor.max_current_ev
        name: Max. Strom Fahrzeug
    - type: entities
      title: Energie (kWh)
      icon: mdi:lightning-bolt-circle
      entities:
      - entity: sensor.wallbox_total_energy_kwh
        name: Gesamtenergie
      - entity: sensor.wallbox_energy_l1_kwh
        name: Energie L1
      - entity: sensor.wallbox_energy_l2_kwh
        name: Energie L2
      - entity: sensor.wallbox_energy_l3_kwh
        name: Energie L3
    - type: entities
      title: Leistung (W)
      icon: mdi:flash
      entities:
      - entity: sensor.wallbox_total_power
        name: Gesamtleistung
      - entity: sensor.meter_power_l1
        name: Leistung L1
      - entity: sensor.meter_power_l2
        name: Leistung L2
      - entity: sensor.meter_power_l3
        name: Leistung L3
    - type: entities
      title: Spannung & Strom
      icon: mdi:current-ac
      entities:
      - entity: sensor.meter_voltage_l1
        name: Spannung L1
      - entity: sensor.meter_voltage_l2
        name: Spannung L2
      - entity: sensor.meter_voltage_l3
        name: Spannung L3
      - entity: sensor.wallbox_current_l1_ampere
        name: Strom L1
      - entity: sensor.wallbox_current_l2_ampere
        name: Strom L2
      - entity: sensor.wallbox_current_l3_ampere
        name: Strom L3
    - type: entities
      title: Limits (gelesen)
      icon: mdi:cog
      entities:
      - entity: sensor.hems_current_limit
        name: HEMS Stromlimit
      - entity: sensor.operator_current_limit
        name: Operator Stromlimit
      - entity: sensor.safe_current
        name: Sicherer Strom
      - entity: sensor.comm_timeout
        name: Kommunikations-Timeout
    - type: entities
      title: Dynamic Load Management (DLM)
      icon: mdi:transmission-tower
      entities:
      - entity: sensor.wallbox_dlm_mode_text
        name: DLM Modus
      - entity: sensor.dlm_num_slaves_connected
        name: Slaves verbunden
      - entity: sensor.dlm_overall_current_available_l1
        name: Verfügbarer Strom L1
      - entity: sensor.dlm_overall_current_available_l2
        name: Verfügbarer Strom L2
      - entity: sensor.dlm_overall_current_available_l3
        name: Verfügbarer Strom L3
      - entity: sensor.dlm_overall_current_applied_l1
        name: Angewandter Strom L1
      - entity: sensor.dlm_overall_current_applied_l2
        name: Angewandter Strom L2
      - entity: sensor.dlm_overall_current_applied_l3
        name: Angewandter Strom L3
  - title: History
    path: wallbox-history
    icon: mdi:history
    type: panel
    cards:
    - type: grid
      columns: 3
      square: false
      cards:
      - type: entities
        title: Statistik & Filter
        icon: mdi:chart-bar
        entities:
        - entity: sensor.wallbox_sessions
          name: Ladevorgänge
        - entity: sensor.wallbox_total_energy_kwh
          name: Gesamtenergie
        - entity: sensor.wallbox_kosten_gesamt_chf
          name: Gesamtkosten
        - entity: sensor.wallbox_kwh_kessi_gesamt
          name: Kessi gesamt
        - entity: sensor.wallbox_kwh_tessi_gesamt
          name: Tessi gesamt
        - entity: sensor.wallbox_kwh_aktueller_monat
          name: kWh akt. Monat
        - entity: sensor.wallbox_kosten_aktueller_monat_chf
          name: Kosten akt. Monat
        - entity: input_select.wallbox_month_filter
          name: Monatsfilter
      - type: custom:apexcharts-card
        header:
          show: true
          title: Monatsverbrauch pro Fahrzeug (kWh)
          show_states: false
          colorize_states: false
        graph_span: 6month
        span:
          end: month
        stacked: true
        grid_options:
          columns: 2
          rows: auto
        series:
        - entity: sensor.wallbox_sessions
          name: Kessi
          type: column
          color: '#448aff'
          data_generator: const v=(entity.attributes.vehicles||[])[0]||'Fahrzeug 1';return (entity.attributes.monthly_summary||[]).map(m=>[new
            Date(m.month+'-02').getTime(),(m.by_vehicle||{})[v]||0]);
        - entity: sensor.wallbox_sessions
          name: Tessi
          type: column
          color: '#ff6d00'
          data_generator: const v=(entity.attributes.vehicles||[])[1]||'Fahrzeug 2';return (entity.attributes.monthly_summary||[]).map(m=>[new
            Date(m.month+'-02').getTime(),(m.by_vehicle||{})[v]||0]);
        apex_config:
          chart:
            height: 320
          plotOptions:
            bar:
              columnWidth: 85%
              borderRadius: 3
          dataLabels:
            enabled: false
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              format: MMM yy
          yaxis:
            title:
              text: kWh
            decimalsInFloat: 1
          tooltip:
            x:
              format: MMM yyyy
            shared: true
            intersect: false
          legend:
            show: true
            position: top
      - type: markdown
        title: Monatstabelle (kWh & CHF)
        grid_options:
          columns: 3
          rows: auto
        content: '{% set monthly = state_attr(''sensor.wallbox_sessions'', ''monthly_summary'') %}

          {% set vehicles = state_attr(''sensor.wallbox_sessions'', ''vehicles'') %}

          {% set price = states(''input_number.wallbox_price_per_kwh'') | float(0.29) %}

          {% set v0 = vehicles[0] if vehicles and vehicles | length > 0 else '''' %}

          {% set v1 = vehicles[1] if vehicles and vehicles | length > 1 else '''' %}

          {% if monthly and monthly | length > 0 %}

          | Monat | {% if v0 %}{{ v0 }} kWh | CHF | {% endif %}{% if v1 %}{{ v1 }} kWh | CHF | {% endif %}Gesamt kWh | CHF
          |

          |-------|{% if v0 %}----------|------|{% endif %}{% if v1 %}----------|------|{% endif %}-----------|------|

          {% for m in monthly | reverse %}| **{{ m.month_label }}** |{% if v0 %} {{ m.by_vehicle.get(v0, 0) | round(1) }}
          | {{ (m.by_vehicle.get(v0, 0) * price) | round(2) }} |{% endif %}{% if v1 %} {{ m.by_vehicle.get(v1, 0) | round(1)
          }} | {{ (m.by_vehicle.get(v1, 0) * price) | round(2) }} |{% endif %} **{{ m.total | round(1) }}** | **{{ (m.total
          * price) | round(2) }}** |

          {% endfor %}

          {% else %}

          *Keine Daten verfügbar. Ladevorgänge werden stündlich oder beim HA-Neustart geladen.*

          {% endif %}'
      - type: markdown
        title: Ladevorgänge
        grid_options:
          columns: 3
          rows: auto
        content: '{% set sessions = state_attr(''sensor.wallbox_sessions'', ''sessions'') %}

          {% set monthly = state_attr(''sensor.wallbox_sessions'', ''monthly_summary'') %}

          {% set vtotals = state_attr(''sensor.wallbox_sessions'', ''vehicle_totals'') %}

          {% set vehicles = state_attr(''sensor.wallbox_sessions'', ''vehicles'') %}

          {% set total = state_attr(''sensor.wallbox_sessions'', ''total_kwh'') %}

          {% set price = states(''input_number.wallbox_price_per_kwh'') | float(0.29) %}

          {% set filter_raw = states(''input_select.wallbox_month_filter'') %}

          {% set filter = ''Alle'' if filter_raw in [''unknown'', ''unavailable'', ''''] else filter_raw %}

          {% if sessions and sessions | length > 0 %}

          {% set ns = namespace(fk='''', filtered=[]) %}

          {% if filter != ''Alle'' and monthly %}{% for m in monthly %}{% if m.month_label == filter %}{% set ns.fk = m.month
          %}{% endif %}{% endfor %}{% endif %}

          {% for s in sessions %}{% set inc = (filter == ''Alle'') or ((s.start or '''')[:7] == ns.fk) %}{% if inc %}{% set
          ns.filtered = ns.filtered + [s] %}{% endif %}{% endfor %}


          **{{ filter }}** — {{ ns.filtered | length }} Ladevorgänge


          | Datum | Fahrzeug | Dauer | Geladen | Kosten |

          |-------|----------|-------|---------|--------|

          {% for s in ns.filtered %}{% set sd = (s.start or '''')[:10] %}| {{ sd[8:10] }}.{{ sd[5:7] }}.{{ sd[0:4] }} {{ (s.start
          or '''')[11:16] }} | **{{ s.vehicle }}** | {{ s.duration or ''—'' }} | **{{ s.energy_kwh }} kWh** | **{{ (s.energy_kwh
          * price) | round(2) }} CHF** |

          {% endfor %}


          ---


          {% if filter == ''Alle'' %}

          | Fahrzeug | Gesamt kWh | Gesamt CHF |

          |----------|-----------|-----------|

          {% for v in vehicles %}| **{{ v }}** | {{ vtotals.get(v, 0) | round(2) }} kWh | {{ (vtotals.get(v, 0) * price) |
          round(2) }} CHF |

          {% endfor %}| **Gesamt** | **{{ total | round(2) }} kWh** | **{{ (total * price) | round(2) }} CHF** |

          {% else %}

          {% for m in monthly %}{% if m.month_label == filter %}

          | Fahrzeug | kWh | CHF |

          |----------|-----|-----|

          {% for v in vehicles %}| **{{ v }}** | {{ m.by_vehicle.get(v, 0) | round(2) }} kWh | {{ (m.by_vehicle.get(v, 0)
          * price) | round(2) }} CHF |

          {% endfor %}| **Gesamt** | **{{ m.total | round(2) }} kWh** | **{{ (m.total * price) | round(2) }} CHF** |

          {% endif %}{% endfor %}

          {% endif %}

          {% else %}

          *Lade Daten... wird beim nächsten HA-Start oder nach 1h aktualisiert.*

          {% endif %}'
  - title: Konfiguration
    path: wallbox-config
    icon: mdi:cog
    cards:
    - type: entities
      title: Fahrzeug zuweisen
      icon: mdi:card-account-details-outline
      entities:
      - entity: input_select.wallbox_rfid_selector
        name: RFID auswählen
      - entity: input_text.wallbox_vehicle_name_new
        name: Neuer Fahrzeugname
    - type: button
      name: Zuweisen & Daten neu laden
      icon: mdi:content-save-check
      tap_action:
        action: call-service
        service: script.wallbox_zuweise_fahrzeug
    - type: markdown
      title: Bekannte Fahrzeuge
      content: '{% set sessions = state_attr(''sensor.wallbox_sessions'', ''sessions'') %}

        {% if sessions %}

        | RFID | Fahrzeug (aktuell) |

        |------|---------------------|

        {% set ns = namespace(seen=[]) %}{% for s in sessions %}{% if s.rfid and s.rfid not in ns.seen %}

        | `{{ s.rfid }}` | **{{ s.vehicle }}** |

        {% set ns.seen = ns.seen + [s.rfid] %}{% endif %}{% endfor %}


        *RFID oben im Dropdown auswählen → Namen vergeben → Zuweisen drücken*

        {% else %}

        *Keine Ladevorgänge geladen*

        {% endif %}'
    - type: entities
      title: Wallbox-Einstellungen
      icon: mdi:cog
      entities:
      - entity: input_number.wallbox_price_per_kwh
        name: Preis / kWh (CHF)
      - entity: input_number.wallbox_hems_current_limit
        name: HEMS Limit setzen
      - entity: input_number.wallbox_safe_current
        name: Sicherer Strom setzen
      - entity: input_number.wallbox_comm_timeout
        name: Timeout setzen
      - entity: input_boolean.wallbox_cp_availability
        name: CP Verfügbarkeit
      - entity: input_boolean.wallbox_pause_charging
        name: Laden pausieren
    - type: entities
      title: Manuelle RFID-Verwaltung (4 Slots)
      icon: mdi:card-account-details
      entities:
      - entity: input_text.wallbox_vehicle_1_rfid
        name: Fahrzeug 1 RFID
      - entity: input_text.wallbox_vehicle_1_name
        name: Fahrzeug 1 Name
      - type: divider
      - entity: input_text.wallbox_vehicle_2_rfid
        name: Fahrzeug 2 RFID
      - entity: input_text.wallbox_vehicle_2_name
        name: Fahrzeug 2 Name
      - type: divider
      - entity: input_text.wallbox_vehicle_3_rfid
        name: Fahrzeug 3 RFID
      - entity: input_text.wallbox_vehicle_3_name
        name: Fahrzeug 3 Name
      - type: divider
      - entity: input_text.wallbox_vehicle_4_rfid
        name: Fahrzeug 4 RFID
      - entity: input_text.wallbox_vehicle_4_name
        name: Fahrzeug 4 Name
    - type: button
      name: Alle 4 Slots speichern & neu laden
      icon: mdi:content-save-all
      tap_action:
        action: call-service
        service: script.wallbox_aktualisiere_fahrzeuge
