- name: "Mennekes AMTRON Wallbox"
  type: tcp
  host: "YOUR_WALLBOX_IP"
  port: 502
  close_comm_on_error: false
  timeout: 5
  retries: 3
  retry_on_empty: true
  sensors:

    # System
    - name: "Firmware Version"
      unique_id: wallbox_firmware_version
      slave: 1
      address: 100
      input_type: holding
      data_type: string
      count: 2

    - name: "OCPP CP Status"
      unique_id: wallbox_ocpp_cp_status
      slave: 1
      address: 104
      input_type: holding
      data_type: uint16
      device_class: enum

    - name: "Error Codes 1"
      unique_id: wallbox_error_codes_1
      slave: 1
      address: 105
      input_type: holding
      data_type: uint32
      state_class: measurement

    - name: "Error Codes 2"
      unique_id: wallbox_error_codes_2
